<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Страница не найдена — Психоголик</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="icon" href="photo/logo.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <style>
        .not-found {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--light-pink);
            text-align: center;
            padding: 40px 20px;
        }
        .not-found-inner { max-width: 480px; }
        .not-found-code {
            font-size: 120px;
            font-weight: 900;
            color: var(--medium-pink);
            line-height: 1;
            margin-bottom: 8px;
            opacity: .3;
        }
        .not-found-title {
            font-size: 26px;
            font-weight: 900;
            color: var(--text-dark);
            margin-bottom: 14px;
        }
        .not-found-text {
            font-size: 15px;
            color: var(--text-mid);
            line-height: 1.7;
            margin-bottom: 32px;
        }
        .not-found-img {
            width: 140px;
            margin: 0 auto 28px;
            display: block;
            opacity: .85;
        }
    </style>
</head>
<body>
<div class="not-found">
    <div class="not-found-inner">
        <img src="photo/edinorog-sidit.png" alt="" class="not-found-img">
        <div class="not-found-code">404</div>
        <h1 class="not-found-title">Страница не найдена</h1>
        <p class="not-found-text">Кажется, эта страница куда-то убежала. Может, её тоже накрыло выгоранием?<br>Возвращайтесь на главную — там всё на месте.</p>
        <a href="index.html" class="btn-yellow">На главную</a>
    </div>
</div>
</body>
</html>
